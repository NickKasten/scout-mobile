name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm run test
      - run: npm audit --audit-level=high

      - name: Upgrade npm for OIDC trusted publishing
        run: |
          TARBALL=$(npm view npm@11 dist.tarball)
          curl -fsSL "$TARBALL" | tar xz -C /tmp
          node /tmp/package/bin/npm-cli.js install -g npm@11
          rm -rf /tmp/package

      - name: Publish @scout-mobile/core
        run: npm publish --provenance --access public -w packages/core

      - name: Publish @scout-mobile/platform-ios
        run: npm publish --provenance --access public -w packages/platform-ios

      - name: Publish @scout-mobile/framework-rn
        run: npm publish --provenance --access public -w packages/framework-rn

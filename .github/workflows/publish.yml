name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm run test
      - run: npm audit --audit-level=high

      - name: Publish @scout-mobile/core
        run: npm publish --provenance --access public -w packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @scout-mobile/platform-ios
        run: npm publish --provenance --access public -w packages/platform-ios
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @scout-mobile/framework-rn
        run: npm publish --provenance --access public -w packages/framework-rn
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm run test
      - run: npm audit --audit-level=high

      - name: Upgrade npm for OIDC trusted publishing
        run: |
          curl -fsSL https://registry.npmjs.org/npm/-/npm-11.0.0.tgz | tar xz -C /tmp
          node /tmp/package/bin/npm-cli.js install -g npm@11
          rm -rf /tmp/package

      - name: Publish @scout-mobile/core
        run: npm publish --provenance --access public -w packages/core

      - name: Publish @scout-mobile/platform-ios
        run: npm publish --provenance --access public -w packages/platform-ios

      # First publish of this package: it has no trusted publisher configured
      # yet (npm can't pre-configure OIDC for a non-existent package), so this
      # step falls back to token auth. After 0.3.0 ships, configure a trusted
      # publisher for @scout-mobile/platform-android and delete this env block +
      # the NPM_TOKEN secret so it matches the OIDC flow of the other packages.
      - name: Publish @scout-mobile/platform-android
        run: npm publish --provenance --access public -w packages/platform-android
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @scout-mobile/framework-rn
        run: npm publish --provenance --access public -w packages/framework-rn

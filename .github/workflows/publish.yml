name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm run test
      - run: npm audit --audit-level=high

      - name: Upgrade npm for OIDC trusted publishing
        run: |
          curl -fsSL https://registry.npmjs.org/npm/-/npm-11.0.0.tgz | tar xz -C /tmp
          node /tmp/package/bin/npm-cli.js install -g npm@11
          rm -rf /tmp/package

      # Each step is idempotent: if that exact version is already on the
      # registry it is skipped, so the workflow can be safely re-run/resumed
      # after a partial publish (e.g. one package failing auth mid-release).
      - name: Publish @scout-mobile/core
        run: |
          v="$(node -p "require('./packages/core/package.json').version")"
          if npm view "@scout-mobile/core@$v" version >/dev/null 2>&1; then
            echo "@scout-mobile/core@$v already published — skipping."
          else
            npm publish --provenance --access public -w packages/core
          fi

      - name: Publish @scout-mobile/platform-ios
        run: |
          v="$(node -p "require('./packages/platform-ios/package.json').version")"
          if npm view "@scout-mobile/platform-ios@$v" version >/dev/null 2>&1; then
            echo "@scout-mobile/platform-ios@$v already published — skipping."
          else
            npm publish --provenance --access public -w packages/platform-ios
          fi

      - name: Publish @scout-mobile/platform-android
        run: |
          v="$(node -p "require('./packages/platform-android/package.json').version")"
          if npm view "@scout-mobile/platform-android@$v" version >/dev/null 2>&1; then
            echo "@scout-mobile/platform-android@$v already published — skipping."
          else
            npm publish --provenance --access public -w packages/platform-android
          fi

      - name: Publish @scout-mobile/framework-rn
        run: |
          v="$(node -p "require('./packages/framework-rn/package.json').version")"
          if npm view "@scout-mobile/framework-rn@$v" version >/dev/null 2>&1; then
            echo "@scout-mobile/framework-rn@$v already published — skipping."
          else
            npm publish --provenance --access public -w packages/framework-rn
          fi
